<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Studio · WQC</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="assets/quantumclublogo-modified.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1915;
            --panel: #232220;
            --panel-2: #2c2b28;
            --border: #3a3935;
            --text: #f0eee6;
            --muted: #9a9893;
            --accent: #d4a574;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        .app {
            display: grid;
            grid-template-columns: 420px 1fr;
            grid-template-rows: 48px 1fr;
            height: 100vh;
        }
        header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        header .title { font-weight: 600; letter-spacing: 0.02em; }
        header .muted { color: var(--muted); font-size: 12px; }
        header .spacer { flex: 1; }
        header select, header button {
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }
        header button:hover, header select:hover { border-color: var(--accent); }
        header button.primary { background: var(--accent); color: #1a1915; border-color: var(--accent); font-weight: 600; }

        .editor {
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .editor-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--panel-2);
        }
        .editor-tabs button {
            background: transparent;
            color: var(--muted);
            border: none;
            border-right: 1px solid var(--border);
            padding: 8px 14px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
        }
        .editor-tabs button.active { color: var(--text); background: var(--panel); }
        .editor-tabs .right { margin-left: auto; display: flex; }
        .editor-tabs .right button { border-right: none; border-left: 1px solid var(--border); }
        .editor textarea {
            flex: 1;
            background: var(--panel);
            color: var(--text);
            border: none;
            outline: none;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            line-height: 1.55;
            resize: none;
            tab-size: 2;
        }
        .editor textarea[hidden] { display: none; }

        .stage {
            background:
                linear-gradient(45deg, #1f1e1b 25%, transparent 25%),
                linear-gradient(-45deg, #1f1e1b 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1f1e1b 75%),
                linear-gradient(-45deg, transparent 75%, #1f1e1b 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
            background-color: #181714;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .frame-wrap {
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
            background: #fff;
            transform-origin: center center;
        }
        iframe.preview {
            border: none;
            display: block;
            background: #fff;
        }

        .status {
            position: fixed;
            bottom: 12px;
            right: 16px;
            font-size: 11px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(26,25,21,0.85);
            padding: 4px 10px;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        .inspector {
            position: fixed;
            left: 16px;
            bottom: 16px;
            width: 280px;
            background: rgba(20,19,16,0.96);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--fg);
            z-index: 50;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        .inspector header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
        }
        .inspector header span { font-weight: 600; letter-spacing: 0.04em; }
        .inspector .body { padding: 8px 10px 10px; max-height: 60vh; overflow: auto; }
        .inspector.collapsed .body { display: none; }
        .insp-card { margin-bottom: 10px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        .insp-card .name { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-weight: 600; }
        .insp-card .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
        .insp-row { display: grid; grid-template-columns: 18px 1fr 56px; gap: 6px; align-items: center; margin-top: 4px; }
        .insp-row label { color: var(--muted); }
        .insp-row input[type=range] { width: 100%; }
        .insp-row input[type=number] {
            background: #111; color: var(--fg); border: 1px solid var(--border);
            border-radius: 3px; padding: 2px 4px; font: inherit; width: 100%;
        }
        .insp-actions { display: flex; gap: 6px; margin-top: 4px; }
        .insp-actions button {
            flex: 1; background: #222; color: var(--fg); border: 1px solid var(--border);
            border-radius: 3px; padding: 4px 6px; font: inherit; cursor: pointer;
        }
        .insp-actions button:hover { background: #2c2b27; }

        @media (max-width: 900px) {
            .app { grid-template-columns: 1fr; grid-template-rows: 48px 40vh 1fr; }
            .editor { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <span class="title">Poster Studio</span>
            <span class="muted">Waterloo Quantum Club · internal</span>
            <span class="spacer"></span>
            <label class="muted" for="template">Template</label>
            <select id="template">
                <option value="blank">Blank</option>
                <option value="channels" selected>Quantum Channels (IG)</option>
                <option value="event">Event — Dark</option>
                <option value="event-light">Event — Light</option>
                <option value="talk">Talk / Speaker</option>
                <option value="workshop">Workshop</option>
                <option value="recruit">Recruitment</option>
            </select>
            <label class="muted" for="size">Size</label>
            <select id="size">
                <option value="igportrait" selected>IG Portrait 1080×1350</option>
                <option value="letter">Letter 8.5×11"</option>
                <option value="tabloid">Tabloid 11×17"</option>
                <option value="a4">A4 210×297mm</option>
                <option value="a3">A3 297×420mm</option>
                <option value="square">Square 1080×1080</option>
                <option value="igportrait">IG Portrait 1080×1350</option>
                <option value="story">Story 1080×1920</option>
            </select>
            <label class="muted" for="zoom">Zoom</label>
            <select id="zoom">
                <option value="fit" selected>Fit</option>
                <option value="0.25">25%</option>
                <option value="0.5">50%</option>
                <option value="0.75">75%</option>
                <option value="1">100%</option>
            </select>
            <button id="copyBtn" title="Copy HTML to clipboard">Copy HTML</button>
            <button id="printBtn" class="primary" title="Print or Save as PDF">Print / PDF</button>
        </header>

        <section class="editor">
            <div class="editor-tabs">
                <button data-tab="html" class="active">HTML</button>
                <button data-tab="css">CSS</button>
                <div class="right">
                    <button id="resetBtn" title="Reload current template">Reset</button>
                </div>
            </div>
            <textarea id="html" spellcheck="false"></textarea>
            <textarea id="css" spellcheck="false" hidden></textarea>
        </section>

        <section class="stage" id="stage">
            <div class="frame-wrap" id="frameWrap">
                <iframe class="preview" id="preview" title="Poster preview"></iframe>
            </div>
        </section>
    </div>
    <div class="status" id="status">ready</div>

    <aside class="inspector" id="inspector" hidden>
        <header id="inspToggle"><span>Card Inspector</span><span id="inspChevron">▾</span></header>
        <div class="body" id="inspBody"></div>
    </aside>

    const $ = (id) => document.getElementById(id);
    const htmlEl = $('html');
    const cssEl = $('css');
    const tplSel = $('template');
    const sizeSel = $('size');
    const zoomSel = $('zoom');
    const preview = $('preview');
    const frameWrap = $('frameWrap');
    const stage = $('stage');
    const status = $('status');
    const STORAGE_KEY = 'wqc_poster_studio_v1';

    function setStatus(msg) {
        status.textContent = msg;
        clearTimeout(setStatus._t);
        setStatus._t = setTimeout(() => status.textContent = 'ready', 1500);
    }

    function currentSize() { return SIZES[sizeSel.value]; }

    function applySize() {
        const s = currentSize();
        preview.style.width = s.w + 'px';
        preview.style.height = s.h + 'px';
        applyZoom();
    }

    function applyZoom() {
        const s = currentSize();
        let scale;
        if (zoomSel.value === 'fit') {
            const pad = 80;
            const sx = (stage.clientWidth - pad) / s.w;
            const sy = (stage.clientHeight - pad) / s.h;
            scale = Math.min(sx, sy, 1);
        } else {
            scale = parseFloat(zoomSel.value);
        }
        frameWrap.style.transform = `scale(${scale})`;
        frameWrap.style.width = s.w + 'px';
        frameWrap.style.height = s.h + 'px';
    }

    function render() {
        const s = currentSize();
        const doc = `<!DOCTYPE html><html><head><meta charset="utf-8">
<style>@page { size: ${s.css}; margin: 0; }${BASE_CSS}${cssEl.value}</style>
</head><body>${htmlEl.value}</body></html>`;
        preview.srcdoc = doc;
        save();
    }

    let renderTimer;
    function scheduleRender() {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(render, 180);
    }

    function loadTemplate(name) {
        const t = TEMPLATES[name] || TEMPLATES.blank;
        htmlEl.value = t.html;
        cssEl.value = t.css.trim();
        render();
    }

    function save() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                html: htmlEl.value, css: cssEl.value,
                size: sizeSel.value, template: tplSel.value,
            }));
        } catch {}
    }

    function load() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            const d = JSON.parse(raw);
            if (d.size && SIZES[d.size]) sizeSel.value = d.size;
            if (d.template) tplSel.value = d.template;
            htmlEl.value = d.html || '';
            cssEl.value = d.css || '';
            return true;
        } catch { return false; }
    }

    // Tabs
    document.querySelectorAll('.editor-tabs button[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.editor-tabs button[data-tab]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const which = btn.dataset.tab;
            htmlEl.hidden = which !== 'html';
            cssEl.hidden = which !== 'css';
            (which === 'html' ? htmlEl : cssEl).focus();
        });
    });

    htmlEl.addEventListener('input', scheduleRender);
    cssEl.addEventListener('input', scheduleRender);
    tplSel.addEventListener('change', () => { loadTemplate(tplSel.value); });
    sizeSel.addEventListener('change', () => { applySize(); render(); });
    zoomSel.addEventListener('change', applyZoom);
    window.addEventListener('resize', () => { if (zoomSel.value === 'fit') applyZoom(); });

    $('resetBtn').addEventListener('click', () => {
        if (confirm('Reload current template? Your unsaved edits will be lost.')) {
            loadTemplate(tplSel.value);
        }
    });

    $('copyBtn').addEventListener('click', async () => {
        const s = currentSize();
        const full = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Poster</title>
<style>@page { size: ${s.css}; margin: 0; }${BASE_CSS}${cssEl.value}</style>
</head><body>${htmlEl.value}</body></html>`;
        try {
            await navigator.clipboard.writeText(full);
            setStatus('copied full HTML');
        } catch {
            setStatus('copy failed');
        }
    });

    $('printBtn').addEventListener('click', () => {
        const s = currentSize();
        const w = window.open('', '_blank');
        w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Poster</title>
<style>@page { size: ${s.css}; margin: 0; } html, body { margin: 0; padding: 0; } body { width: ${s.w}px; height: ${s.h}px; }${BASE_CSS}${cssEl.value}</style>
</head><body>${htmlEl.value}<script>window.onload=()=>setTimeout(()=>window.print(),250);<\/script></body></html>`);
        w.document.close();
    });

    // ---- Card Inspector ----
    const INSPECTOR_CARDS = [
        { sel: 'center', label: 'Cream — Outscore', color: '#ece4d2' },
        { sel: 'left',   label: 'Coral — 01 Distribute', color: '#d97757' },
        { sel: 'below',  label: 'Blue — 02 Every week', color: '#6d8db5' },
        { sel: 'right',  label: 'Green — 03 Superposition', color: '#6b9c7c' },
    ];
    const DEFAULT_CARDS = {
        left:   { x: -10, y: 820,  w: 356, h: 560 },
        center: { x: 370, y: 620,  w: 356, h: 348 },
        below:  { x: 370, y: 992,  w: 356, h: 360 },
        right:  { x: 750, y: 950,  w: 340, h: 430 },
    };
    const CARD_KEY = 'qc.poster.cards.v4';
    let cardState = (() => {
        try { return Object.assign({}, DEFAULT_CARDS, JSON.parse(localStorage.getItem(CARD_KEY) || '{}')); }
        catch { return { ...DEFAULT_CARDS }; }
    })();

    const inspector = $('inspector');
    const inspBody  = $('inspBody');
    const inspToggle = $('inspToggle');
    const inspChevron = $('inspChevron');

    function cardOverrideCss() {
        return Object.entries(cardState).map(([k, v]) =>
            `.card.${k}{left:${v.x}px!important;right:auto!important;top:${v.y}px!important;width:${v.w}px!important;height:${v.h}px!important;transform:none!important;}`
        ).join('\n');
    }

    function saveCards() {
        try { localStorage.setItem(CARD_KEY, JSON.stringify(cardState)); } catch {}
    }

    function buildInspector() {
        inspBody.innerHTML = '';
        INSPECTOR_CARDS.forEach(({ sel, label, color }) => {
            const v = cardState[sel];
            const wrap = document.createElement('div');
            wrap.className = 'insp-card';
            wrap.innerHTML = `
                <div class="name"><span class="swatch" style="background:${color}"></span>${label}</div>
                ${[
                    ['x','X', 0, 1080],
                    ['y','Y', 0, 1600],
                    ['w','W', 80, 1080],
                    ['h','H', 80, 1200],
                ].map(([k, lbl, min, max]) => `
                    <div class="insp-row" data-card="${sel}" data-prop="${k}">
                        <label>${lbl}</label>
                        <input type="range" min="${min}" max="${max}" value="${v[k]}">
                        <input type="number" min="${min}" max="${max}" value="${v[k]}">
                    </div>
                `).join('')}
            `;
            inspBody.appendChild(wrap);
        });
        const actions = document.createElement('div');
        actions.className = 'insp-actions';
        actions.innerHTML = `<button id="inspReset">Reset</button><button id="inspCopy">Copy CSS</button>`;
        inspBody.appendChild(actions);

        inspBody.querySelectorAll('.insp-row').forEach(row => {
            const card = row.dataset.card, prop = row.dataset.prop;
            const range = row.querySelector('input[type=range]');
            const num   = row.querySelector('input[type=number]');
            const sync = (val) => {
                val = Math.max(parseInt(range.min,10), Math.min(parseInt(range.max,10), parseInt(val,10) || 0));
                range.value = val; num.value = val;
                cardState[card][prop] = val;
                saveCards(); render();
            };
            range.addEventListener('input', () => sync(range.value));
            num.addEventListener('input',   () => sync(num.value));
        });

        $('inspReset').addEventListener('click', () => {
            cardState = JSON.parse(JSON.stringify(DEFAULT_CARDS));
            saveCards(); buildInspector(); render();
        });
        $('inspCopy').addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(cardOverrideCss()); setStatus('card CSS copied'); }
            catch { setStatus('copy failed'); }
        });
    }

    inspToggle.addEventListener('click', () => {
        inspector.classList.toggle('collapsed');
        inspChevron.textContent = inspector.classList.contains('collapsed') ? '▸' : '▾';
    });

    function syncInspectorVisibility() {
        inspector.hidden = tplSel.value !== 'channels';
    }
    tplSel.addEventListener('change', syncInspectorVisibility);

    // Inject overrides into the rendered iframe by wrapping render()
    render = function() {
        const s = currentSize();
        const overrides = tplSel.value === 'channels' ? `\n${cardOverrideCss()}` : '';
        const doc = `<!DOCTYPE html><html><head><meta charset="utf-8">
<style>@page { size: ${s.css}; margin: 0; }${BASE_CSS}${cssEl.value}${overrides}</style>
</head><body>${htmlEl.value}</body></html>`;
        preview.srcdoc = doc;
        save();
    };

    buildInspector();
    syncInspectorVisibility();

    // Init
    if (!load()) loadTemplate(tplSel.value);
    applySize();
    render();
})();
</script>
</body>
</html>
